name: CI config-diff
permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    paths:
      - "scripts/config-diff/**"
      - mise.toml

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/go_module_ci.yml
    with:
      module: config-diff
