name: Bump tool versions

on:
  schedule:
    - cron: "0 3 * * 1" # every Monday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve latest versions (policy-pinned tools)
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          # Node LTS latest (mise upgrade --bump would jump to non-LTS majors)
          NODE_VERSION=$(curl -s https://nodejs.org/dist/index.json | jq -r '[.[] | select(.lts != false)] | max_by(.version | ltrimstr("v") | split(".") | map(tonumber)) | .version | ltrimstr("v")')

          ## Go latest stable
          GO_VERSION=$(curl -s 'https://go.dev/dl/?mode=json' | jq -r '[.[] | select(.stable==true)][0].version | ltrimstr("go")')

          # Neovim latest release version
          NEOVIM_VERSION=$(curl -s https://api.github.com/repos/neovim/neovim/releases/latest | jq -r '.tag_name | ltrimstr("v")')

          # npm cli latest
          NPM_VERSION=$(curl -s https://registry.npmjs.org/npm/latest | jq -r '.version')

          # Terraform latest GA (Checkpoint API matches releases.hashicorp.com download source)
          TERRAFORM_VERSION=$(curl -s https://checkpoint-api.hashicorp.com/v1/check/terraform | jq -r '.current_version')

          echo "node=$NODE_VERSION" >> $GITHUB_OUTPUT
          echo "go=$GO_VERSION" >> $GITHUB_OUTPUT
          echo "neovim=$NEOVIM_VERSION" >> $GITHUB_OUTPUT
          echo "npm=$NPM_VERSION" >> $GITHUB_OUTPUT
          echo "terraform=$TERRAFORM_VERSION" >> $GITHUB_OUTPUT

      - name: Update mise.toml pins
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          # Policy-pinned toolchains ([tools]) and Docker-only versions ([env])
          mise use --pin \
            go@${{ steps.resolve.outputs.go }} \
            node@${{ steps.resolve.outputs.node }}
          mise set \
            NEOVIM_VERSION=${{ steps.resolve.outputs.neovim }} \
            NPM_VERSION=${{ steps.resolve.outputs.npm }} \
            TERRAFORM_VERSION=${{ steps.resolve.outputs.terraform }}
          # Everything else in [tools] goes to latest (go/node excluded above)
          mise upgrade --bump \
            shfmt shellcheck stylua hadolint golangci-lint \
            'go:golang.org/x/tools/cmd/goimports' \
            'go:golang.org/x/tools/gopls' \
            'go:github.com/go-delve/delve/cmd/dlv' \
            'go:github.com/nametake/golangci-lint-langserver' \
            terraform-ls tflint

      - name: Regenerate pinned artifacts
        run: mise run pins:sync

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: |-
            chore: bump tool versions

            - Node: ${{ steps.resolve.outputs.node }}
            - Go: ${{ steps.resolve.outputs.go }}
            - Neovim: ${{ steps.resolve.outputs.neovim }}
            - npm: ${{ steps.resolve.outputs.npm }}
            - Terraform: ${{ steps.resolve.outputs.terraform }}
            - mise-managed tools: latest (see mise.toml diff)
          title: "chore: bump tool versions"
          body: |-
            This PR bumps tool versions pinned in `mise.toml` and regenerates the
            derived artifacts (`environment/tools/go/go-tools.txt` and the ARG
            defaults in `environment/docker/nvim.dockerfile`).

            - Node: `${{ steps.resolve.outputs.node }}` (latest LTS)
            - Go: `${{ steps.resolve.outputs.go }}` (latest stable)
            - Neovim: `${{ steps.resolve.outputs.neovim }}`
            - npm CLI: `${{ steps.resolve.outputs.npm }}`
            - Terraform: `${{ steps.resolve.outputs.terraform }}`
            - Other mise-managed tools: bumped to latest (see `mise.toml` diff)

            Automated by scheduled workflow.
          branch: chore/bump-tool-versions
          labels: dependencies
