name: Build nvim image on dependency PRs
permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-docker-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Docker build (environment/docker/nvim.dockerfile)
    if: |
      contains(toJson(github.event.pull_request.labels), 'dependencies') ||
      github.actor == 'dependabot[bot]' ||
      startsWith((github.head_ref || ''), 'chore/bump-tool-versions')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      DOCKER_BUILDKIT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image with versions from mise.toml
        run: mise run docker:build
