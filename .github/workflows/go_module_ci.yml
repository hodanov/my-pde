name: Go module CI
permissions:
  contents: read
  pull-requests: write

on:
  workflow_call:
    inputs:
      module:
        description: "Module name under scripts/ (e.g. config-diff)"
        required: true
        type: string
      generate-check:
        description: "Verify generated code is up to date before lint"
        required: false
        type: boolean
        default: false
      test-exclude-pattern:
        description: "grep -Ev pattern to exclude packages from go test"
        required: false
        type: string
        default: ""

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify generated code is up to date
        if: inputs.generate-check
        run: |
          mise run ${{ inputs.module }}:generate
          git diff --exit-code -- scripts/${{ inputs.module }}

      - name: Run lint
        run: mise run ${{ inputs.module }}:lint

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: scripts/${{ inputs.module }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests with coverage
        env:
          EXCLUDE_PATTERN: ${{ inputs.test-exclude-pattern }}
        run: |
          if [ -n "$EXCLUDE_PATTERN" ]; then
            go test $(go list ./... | grep -Ev "$EXCLUDE_PATTERN") -v -count=1 -coverprofile=coverage.out
          else
            go test ./... -v -count=1 -coverprofile=coverage.out
          fi

      - name: Generate coverage report
        id: coverage
        run: |
          COVER_OUTPUT=$(go tool cover -func=coverage.out)
          TOTAL=$(echo "$COVER_OUTPUT" | grep '^total:' | awk '{print $NF}')

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          {
            echo "report<<${EOF}"
            echo "$COVER_OUTPUT"
            echo "${EOF}"
            echo "total=${TOTAL}"
          } >> "$GITHUB_OUTPUT"

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        working-directory: ${{ github.workspace }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          MARKER="<!-- coverage-${{ inputs.module }} -->"
          BODY="${MARKER}
          ## 📊 Go Test Coverage: ${{ inputs.module }}

          **Total coverage: ${{ steps.coverage.outputs.total }}**

          <details>
          <summary>Per-package / per-function breakdown</summary>

          \`\`\`
          ${{ steps.coverage.outputs.report }}
          \`\`\`

          </details>"

          EXISTING_COMMENT_ID=$(gh api \
            "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" \
          )

          if [ -n "$EXISTING_COMMENT_ID" ]; then
            gh api \
              --method PATCH \
              "repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT_ID}" \
              -f body="${BODY}"
          else
            gh api \
              --method POST \
              "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              -f body="${BODY}"
          fi
