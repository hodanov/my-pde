name: Weekly Improvement Scan
permissions:
  contents: read # 試運転は read のみ。PR 自動化フェーズで write に引き上げ
  issues: write # Issue 起票に必要
  id-token: write
  # pull-requests: write は adopted が 10 回連続したら追加する

on:
  schedule:
    - cron: "0 0 * * 0" # 毎週日曜 00:00 UTC
  workflow_dispatch:
  pull_request:

concurrency:
  group: weekly-improvement-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: code
            label: "scan:code"
            paths: "scripts/ai-bridge/**"
            prompt: "scripts/ai-bridge/ のコード品質・リファクタリング箇所を分析せよ(下記の golangci-lint 結果も参照)。"
          - name: skills
            label: "scan:skills"
            paths: "ai-agents/skills/**"
            prompt: "ai-agents/skills/ 配下の Skill 定義の改善余地を分析せよ。"
          - name: ci
            label: "scan:ci"
            paths: ".github/workflows/**"
            prompt: ".github/workflows/ の CI/CD 改善を分析せよ(下記の actionlint 結果も参照)。"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # 系統ごとに必要な lint を事前実行し、結果を /tmp/lint.txt 経由で Claude に読ませる
      - name: Setup Go
        if: matrix.target.name == 'code'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: scripts/ai-bridge/go.mod

      - name: Run golangci-lint
        if: matrix.target.name == 'code'
        working-directory: scripts/ai-bridge
        run: |
          # 取得元スクリプト・導入バージョンとも v2.3.1 に固定（environment/tools/go/go-tools.txt と一致させ再現性を担保）
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.3.1/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.3.1
          "$(go env GOPATH)/bin/golangci-lint" run ./... 2>&1 | tee /tmp/lint.txt || true

      - name: Run actionlint
        if: matrix.target.name == 'ci'
        run: |
          # 取得元スクリプト・導入バージョンとも v1.7.12 に固定（main 追従をやめ再現性を担保）
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
          ./actionlint -color 2>&1 | tee /tmp/lint.txt || true

      # 既存 Open Issue を取得し、重複排除の判断材料として Claude に渡す
      - name: List existing issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue list --repo "${{ github.repository }}" \
            --state open --label "${{ matrix.target.label }}" \
            --json number,title,body --limit 50 > /tmp/existing_issues.json
          cat /tmp/existing_issues.json

      - name: Run Claude scan
        uses: anthropics/claude-code-action@d5726de019ec4498aa667642bc3a80fca83aa102 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          claude_args: "--max-turns 15"
          prompt: |
            REPO: ${{ github.repository }}
            対象パス: ${{ matrix.target.paths }}
            ${{ matrix.target.prompt }}

            手順:
            1. /tmp/existing_issues.json を読み、既存の Open Issue を把握する。
            2. lint 結果ファイル /tmp/lint.txt があれば読み、分析に反映する。
            3. 対象パスを分析し、改善提案をまとめる。
            4. 同等の提案が既存 Issue にある場合は新規作成せず、必要なら既存 Issue に
               コメントで補足するか、何もしない。
            5. 新規の提案がある場合のみ、
               `gh issue create --label "${{ matrix.target.label }}"` で起票する。
               タイトルは簡潔に、本文に背景・該当箇所・推奨対応を記載する。
