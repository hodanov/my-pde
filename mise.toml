# ---- Dotfiles ----

[tasks.dotfiles-link]
description = "Symlink dotfiles/wezterm -> ~/.config/wezterm"
run = '''
mkdir -p "$HOME/.config"
rm -f "$HOME/.wezterm.lua"
ln -sfn "{{config_root}}/dotfiles/wezterm" "$HOME/.config/wezterm"
echo "Linked {{config_root}}/dotfiles/wezterm -> $HOME/.config/wezterm"
'''

[tasks.dotfiles-unlink]
description = "Remove the ~/.config/wezterm symlink"
run = '''
rm -f "$HOME/.config/wezterm"
echo "Unlinked $HOME/.config/wezterm"
'''

# ---- Repo-wide lint (CI parity) ----

[tasks."lint:shell"]
description = "Run shfmt and shellcheck on all shell scripts"
run = [
  "find . -name '*.sh' -not -path './.git/*' -not -path '*/node_modules/*' -exec shfmt -d {} +",
  "find . -name '*.sh' -not -path './.git/*' -not -path '*/node_modules/*' -exec shellcheck {} +",
]

[tasks."lint:stylua"]
description = "Run stylua check on all Lua files"
run = "stylua --check ."

[tasks."lint:docker"]
description = "Run hadolint on the nvim Dockerfile"
run = "hadolint environment/docker/nvim.dockerfile"

[tasks."lint:format"]
description = "Run tombi, prettier, and markdownlint via environment/tools/node"
dir = "{{config_root}}"
run = '''
npm --prefix environment/tools/node install
export PATH="$PWD/environment/tools/node/node_modules/.bin:$PATH"
tombi lint
prettier --check .
markdownlint-cli2 "**/*.md"
'''

# ---- Changed-files verification (human entry point; the verify-runner
# subagent runs ai-agents/scripts/verify-changed.sh directly) ----

[tasks."verify:changed"]
description = "Run tests/linters mapped to changed files (pass files after --)"
run = '"{{config_root}}/ai-agents/scripts/verify-changed.sh"'

# ---- Docker ----

[tasks."docker:build"]
description = "Build the nvim image with versions injected from mise.toml"
run = '''
GO_VERSION="$(go env GOVERSION | sed 's/^go//')"
NODE_VERSION="$(node --version | sed 's/^v//')"
docker build \
  --file environment/docker/nvim.dockerfile \
  --build-arg GO_VERSION="$GO_VERSION" \
  --build-arg NODE_VERSION="$NODE_VERSION" \
  --build-arg NEOVIM_VERSION="$NEOVIM_VERSION" \
  --build-arg NPM_VERSION="$NPM_VERSION" \
  --build-arg RUST_TOOLCHAIN="$RUST_TOOLCHAIN" \
  --build-arg TERRAFORM_VERSION="$TERRAFORM_VERSION" \
  --progress=plain .
'''

# ---- Pinned artifacts (generated from mise.toml) ----

[tasks."pins:sync"]
description = "Regenerate go-tools.txt and Dockerfile ARG defaults from mise.toml"
run = '"{{config_root}}/environment/tools/sync-pins.sh"'

[tasks."pins:check"]
description = "Verify generated pins are in sync with mise.toml"
depends = ["pins:sync"]
run = "git diff --exit-code -- environment/tools/go/go-tools.txt environment/docker/nvim.dockerfile"
