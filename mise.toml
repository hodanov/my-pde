# ---- AI agents deploy: agents.xml symlinks ----

[tasks.codex-link]
description = "Symlink agents.xml -> ~/.codex/AGENTS.md"
run = '''
ln -sf "{{config_root}}/ai-agents/agents.xml" "$HOME/.codex/AGENTS.md"
echo "Linked $HOME/.codex/AGENTS.md -> {{config_root}}/ai-agents/agents.xml"
'''

[tasks.codex-unlink]
description = "Remove the ~/.codex/AGENTS.md symlink"
run = '''
if [ -L "$HOME/.codex/AGENTS.md" ]; then
  rm -f "$HOME/.codex/AGENTS.md"
  echo "Removed symlink $HOME/.codex/AGENTS.md"
else
  echo "$HOME/.codex/AGENTS.md is not a symlink or does not exist."
fi
'''

