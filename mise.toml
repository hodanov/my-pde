# mise.toml — single source of truth for tool versions and tasks.
# Setup: `brew install mise` and add `eval "$(mise activate zsh)"` to ~/.zshrc,
# then run `mise install` at the repo root.

[tools]
go = "1.26.4"
golangci-lint = "2.12.2"
node = "24.18.0"
shfmt = "3.13.1"
shellcheck = "0.11.0"
stylua = "2.5.2"
hadolint = "2.14.0"
"go:golang.org/x/tools/cmd/goimports" = "0.47.0"
"go:golang.org/x/tools/gopls" = "0.22.0"
"go:github.com/go-delve/delve/cmd/dlv" = "1.27.0"
"go:github.com/nametake/golangci-lint-langserver" = "0.0.12"
terraform-ls = "0.38.8"
tflint = "0.63.1"

# Docker-only versions: synced into the Dockerfile ARG defaults by
# `mise run pins:sync` and injected as --build-arg by `mise run docker:build`.
[env]
NEOVIM_VERSION = "0.12.4"
NPM_VERSION = "11.18.0"
RUST_TOOLCHAIN = "stable"
TERRAFORM_VERSION = "1.15.7"

# ---- ai-bridge (Go) ----

[tasks."ai-bridge:build"]
description = "Build the ai-bridge binary"
dir = "scripts/ai-bridge"
run = "go build -o ai-bridge ./cmd/ai-bridge"

[tasks."ai-bridge:generate"]
description = "Regenerate mocks (go generate)"
dir = "scripts/ai-bridge"
run = "go generate ./..."

[tasks."ai-bridge:sign"]
description = "Ad-hoc codesign the ai-bridge binary"
dir = "scripts/ai-bridge"
depends = ["ai-bridge:build"]
run = "codesign --sign - --force ai-bridge"

[tasks."ai-bridge:install"]
description = "Sign and register ai-bridge with launchd (local only)"
dir = "scripts/ai-bridge"
depends = ["ai-bridge:sign"]
run = "./ai-bridge install-launchd"

[tasks."ai-bridge:test"]
description = "Run ai-bridge Go tests"
dir = "scripts/ai-bridge"
run = "go test ./..."

[tasks."ai-bridge:lint"]
description = "Run golangci-lint and goimports check for ai-bridge"
dir = "scripts/ai-bridge"
run = [
  "golangci-lint run --allow-parallel-runners",
  '''
diff=$(find . -name '*.go' -not -path './internal/usecase/port/mock/*' -exec goimports -d {} +)
if [ -n "$diff" ]; then
  echo "$diff"
  exit 1
fi
''',
]

[tasks."ai-bridge:clean"]
description = "Remove ai-bridge build artifacts"
dir = "scripts/ai-bridge"
run = "rm -f ai-bridge coverage.out"

