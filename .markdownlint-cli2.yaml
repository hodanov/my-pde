config:
  MD013: false
  MD041: false

ignores:
  - ".github"
  - "assets"
  # Marp slide decks legitimately use inline HTML and multiple H1s (lead slides),
  # which conflict with prose-oriented rules. Exclude decks and the Marp template.
  - "docs/slides/**"
  - "**/marp-template.md"
  - "**/.bash_profile"
  - "**.json"
  - "**.lua"
  - "**.yml"
  - "**.sh"
  - "**.toml"
  - "**.txt"
  - "**/*.dockerfile"
  - "**/node_modules/**"
